<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  </head>

  <body>
    <form method="post">
      {% csrf_token %}
      <section class="vh-100 bg-">
        <div class="container py-5 h-100">
          <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
              <div class="card shadow-2-strong bg-secondary text-light" style="border-radius: 1rem;">
                <div class="card-body p-5 text-center">
                  <h2><strong>Login do Sistema</strong></h2>

                  <div class="form-outline mb-4">
                    <input type="text" class="form-control form-control-lg mb-1"  />
                    <label class="form-label"><strong>USUÁRIO</strong></label>
                    {{ form.username }}
                  </div>

                  <div class="form-outline mb-4">
                    <input type="password" class="form-control form-control-lg mb-1"/>
                    <label class="form-label"><strong>SENHA</strong></label>
                    {{ form.password }}
                  </div>

                  <button class="btn btn-outline-light btn-lg btn-block w-75" type="submit">Login</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
  </body>
</html>
